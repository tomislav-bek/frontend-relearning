<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Semantic HTML</title>
</head>

<body>
	<header>
		<h1>My Website</h1>
		<nav>
			<ul>
				<li><a href="#">Home</a></li>
				<li><a href="#">About</a></li>
				<li><a href="#">Contact</a></li>
			</ul>
		</nav>
	</header>

	<main>
		<section>
			<h2>About Semantic HTML</h2>
			<p>Semantic HTML helps structure content in a meaningful way.</p>
		</section>

		<article>
			<h2>Why it matters</h2>
			<p>It makes pages easier to read, understand, and maintain.</p>
		</article>

		<aside>
			<h2>Extra info</h2>
			<p>This is additional content related to the main topic.</p>
		</aside>
	</main>

	<footer>
		<p>&copy; 2026 My Website</p>
	</footer>
</body>

</html>
